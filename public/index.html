<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunoForge - Forgez votre Musique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <nav class="border-b border-gray-800 p-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-600 bg-clip-text text-transparent">SunoForge</h1>
        <div id="auth-status" class="text-sm text-gray-400">Non connecté</div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 p-6">
        <section class="text-center mb-12">
            <h2 class="text-4xl font-extrabold mb-4">Créez votre prochain hit avec l'IA</h2>
            <p class="text-gray-400">Décrivez votre style, nous forgeons le morceau.</p>
        </section>

        <div class="bg-gray-800 p-8 rounded-2xl shadow-xl border border-gray-700">
            <div class="mb-6">
                <label for="prompt" class="block text-sm font-medium text-gray-300 mb-2">Décrivez votre musique</label>
                <textarea id="prompt" rows="3" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-4 text-white focus:ring-2 focus:ring-purple-500 focus:outline-none" placeholder="Ex: Un morceau synthwave épique avec des voix féminines et un rythme entraînant..."></textarea>
            </div>

            <button id="generate-btn" class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-4 rounded-lg transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg">
                Forger le morceau
            </button>
        </div>

        <div id="results" class="mt-12 grid gap-6">
            <!-- Les résultats s'afficheront ici -->
        </div>
    </main>

    <script>
        const generateBtn = document.getElementById('generate-btn');
        const resultsDiv = document.getElementById('results');
        const promptInput = document.getElementById('prompt');

        generateBtn.addEventListener('click', async () => {
            const prompt = promptInput.value;
            if (!prompt) return alert('Veuillez entrer une description');

            generateBtn.disabled = true;
            generateBtn.innerText = 'Forging...';

            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });

                const data = await response.json();

                resultsDiv.innerHTML = `
                    <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 animate-pulse">
                        <div class="flex items-center justify-between">
                            <div>
                                <h3 class="font-bold text-lg text-purple-400">Morceau généré : ${data.title || 'Mon chef-d\'œuvre'}</h3>
                                <p class="text-sm text-gray-400 mt-1">Prêt pour l'écoute</p>
                            </div>
                            <div class="bg-purple-600 p-3 rounded-full">
                                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                alert('Erreur lors de la génération');
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerText = 'Forger le morceau';
            }
        });
    </script>
</body>
</html>
